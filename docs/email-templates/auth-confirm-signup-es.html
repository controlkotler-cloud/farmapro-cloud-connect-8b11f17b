<!--
  ============================================================================
  Plantilla Supabase Auth · "Confirm signup" · Portal farmapro · ES
  ============================================================================
  Va en: Supabase Dashboard → Authentication → Email Templates → Confirm signup
  (el usuario de esta cuenta NO tiene acceso directo al Dashboard — se aplica
  vía Lovable, ver prompt en farmapro-portal/docs/email-templates/README.md
  o el mensaje de la sesión que generó este fichero).

  REGLA DE ORO: NO tocar {{ .ConfirmationURL }} — es la variable de Supabase
  que arma el link firmado (token) de verificación. Cambiar su nombre o
  quitarla rompe la validación de cuenta. El resto del HTML (textos, estilos,
  logo) es libre.

  Estilos inline únicamente (regla email HTML de este proyecto, ver
  impulso/01-newsletters/_partials/BASE-email-inline.html) — los clientes de
  correo strippean <style>, así que todo va en el atributo style de cada tag.

  Colores/tipografía: canon DESIGN.md raíz (verde #88C835 texto tinta encima,
  brand-dark #5F8F20 para botones con texto blanco, Open Sans/Arial en email).
  ============================================================================
-->
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="border-collapse:collapse;background-color:#f4f4f4;">
  <tr>
    <td align="center" style="padding:32px 12px;">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="480" style="border-collapse:collapse;background-color:#ffffff;max-width:480px;width:100%;border-radius:14px;">
        <tr>
          <td style="padding:40px 32px;font-family:'Open Sans',Arial,Helvetica,sans-serif;text-align:center;">

            <img src="https://farmapro.es/email-logo-farmapro.png" alt="farmapro" width="130" style="display:block;width:130px;height:auto;border:0;outline:none;margin:0 auto 28px;">

            <h1 style="margin:0 0 16px;font-size:22px;font-weight:800;color:#181C17;line-height:1.3;text-align:center;">Confirma tu cuenta</h1>

            <p style="margin:0 0 28px;font-size:16px;line-height:1.6;color:#3a3f38;text-align:center;">
              Gracias por registrarte en el <strong style="color:#181C17;">Portal farmapro</strong>. Confirma tu email para activar tu cuenta y empezar a usarlo.
            </p>

            <table role="presentation" cellspacing="0" cellpadding="0" border="0" align="center" style="border-collapse:collapse;">
              <tr>
                <td align="center" style="border-radius:999px;background-color:#5F8F20;">
                  <a href="{{ .ConfirmationURL }}" style="display:inline-block;color:#ffffff;text-decoration:none;font-size:15px;font-weight:800;letter-spacing:0.04em;padding:16px 40px;text-transform:uppercase;line-height:1;">Confirmar mi cuenta</a>
                </td>
              </tr>
            </table>

            <p style="margin:32px 0 0;font-size:13px;line-height:1.5;color:#9a9a9a;text-align:center;">
              Si no has creado esta cuenta, puedes ignorar este email.
            </p>

          </td>
        </tr>
      </table>

      <p style="margin:20px 0 0;font-size:12px;line-height:1.6;color:#9a9a9a;text-align:center;">
        farmapro &middot; el ecosistema para farmacias
      </p>

    </td>
  </tr>
</table>
